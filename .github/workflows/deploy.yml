name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/notes-app

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          script: |
            set -e

            APP_DIR=/home/ubuntu/Devops-NotesApp
            ENV_FILE=.env.prod
            COMPOSE_FILE=docker-compose.prod.yml
            NEW_SHA=${{ steps.vars.outputs.SHORT_SHA }}

            cd $APP_DIR

            echo "==> Current working dir:"
            pwd

            echo "==> Reading current IMAGE_TAG"
            CURRENT_SHA=$(grep '^IMAGE_TAG=' $ENV_FILE | cut -d '=' -f2 || true)

            if [ -z "$CURRENT_SHA" ]; then
              echo "IMAGE_TAG not found in $ENV_FILE"
              exit 1
            fi

            echo "Current SHA: $CURRENT_SHA"
            echo "New SHA: $NEW_SHA"

            echo "==> Updating IMAGE_TAG in .env.prod"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$NEW_SHA/" $ENV_FILE

            echo "==> Pulling images"
            docker compose --env-file $ENV_FILE -f $COMPOSE_FILE pull

            echo "==> Starting containers"
            docker compose --env-file $ENV_FILE -f $COMPOSE_FILE up -d

            echo "==> Waiting before health check"
            sleep 10

            echo "==> Health check"
            if curl -f http://localhost/health; then
              echo "Deployment succeeded"
            else
              echo "Deployment failed. Rolling back..."

              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$CURRENT_SHA/" $ENV_FILE
              docker compose --env-file $ENV_FILE -f $COMPOSE_FILE pull
              docker compose --env-file $ENV_FILE -f $COMPOSE_FILE up -d

              echo "Rollback completed"
              exit 1
            fi